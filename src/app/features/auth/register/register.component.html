<div class="min-h-screen flex items-center justify-center bg-linear-to-br from-mauve-950  to-blue-950 px-4 sm:px-6 lg:px-8">
  <div class="w-full max-w-md">
    <!-- Logo -->
    <div class="text-center mb-8">
      <h1 class="text-3xl sm:text-4xl font-bold text-white tracking-tight">Sistema Gestor</h1>
      <p class="text-yellow-200 mt-2 text-base sm:text-lg">Incidencias</p>
    </div>

    <!-- Card -->
    <div class="bg-white/10 backdrop-blur-xl rounded-2xl shadow-2xl border border-white/20 p-6 sm:p-8">
      <h2 class="text-2xl font-semibold text-white text-center mb-6">Crear Cuenta</h2>

      @if (error()) {
        <div class="bg-red-500/20 border border-red-500/50 text-red-200 rounded-lg px-4 py-3 mb-4 text-sm">
          {{ error() }}
        </div>
      }

      @if (success()) {
        <div class="bg-green-500/20 border border-green-500/50 text-green-200 rounded-lg px-4 py-3 mb-4 text-sm">
          ¡Cuenta creada exitosamente! Redirigiendo al login...
        </div>
      }

      <form (ngSubmit)="onSubmit()" class="space-y-5">
        <div>
          <label for="name" class="block text-sm font-medium text-purple-100 mb-1.5">Nombre completo</label>
          <input
            type="text"
            id="name"
            [value]="name()"
            (input)="name.set($any($event.target).value)"
            required
            class="w-full px-4 py-3 bg-white/10 border border-white/20 rounded-lg text-white placeholder-purple-300/50 focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-transparent transition-all"
            placeholder="Tu nombre"
          />
        </div>

        <div>
          <label for="email" class="block text-sm font-medium text-purple-100 mb-1.5">Correo electrónico</label>
          <input
            type="email"
            id="email"
            [value]="email()"
            (input)="email.set($any($event.target).value)"
            required
            class="w-full px-4 py-3 bg-white/10 border border-white/20 rounded-lg text-white placeholder-purple-300/50 focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-transparent transition-all"
            placeholder="correo@ejemplo.com"
          />
        </div>

        <div>
          <label for="password" class="block text-sm font-medium text-purple-100 mb-1.5">Contraseña</label>
          <input
            type="password"
            id="password"
            [value]="password()"
            (input)="password.set($any($event.target).value)"
            required
            minlength="6"
            class="w-full px-4 py-3 bg-white/10 border border-white/20 rounded-lg text-white placeholder-purple-300/50 focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-transparent transition-all"
            placeholder="Mínimo 6 caracteres"
          />
        </div>

        <div>
          <label for="confirmPassword" class="block text-sm font-medium text-purple-100 mb-1.5">Confirmar contraseña</label>
          <input
            type="password"
            id="confirmPassword"
            [value]="confirmPassword()"
            (input)="confirmPassword.set($any($event.target).value)"
            required
            class="w-full px-4 py-3 bg-white/10 border border-white/20 rounded-lg text-white placeholder-purple-300/50 focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-transparent transition-all"
            placeholder="Repite la contraseña"
          />
        </div>

        <button
          type="submit"
          [disabled]="loading() || success()"
          class="w-full py-3 px-4 bg-linear-to-r from-purple-600 to-indigo-600 hover:from-purple-500 hover:to-indigo-500 text-white font-semibold rounded-lg shadow-lg shadow-purple-500/30 disabled:opacity-50 disabled:cursor-not-allowed transition-all duration-200"
        >
          @if (loading()) {
            <span class="flex items-center justify-center gap-2">
              <svg class="animate-spin h-5 w-5" viewBox="0 0 24 24" fill="none">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
              </svg>
              Creando cuenta...
            </span>
          } @else {
            Crear Cuenta
          }
        </button>
      </form>

      <div class="mt-6 text-center">
        <p class="text-purple-200 text-sm">
          ¿Ya tienes cuenta?
          <button
            (click)="goToLogin()"
            class="text-white font-semibold hover:underline ml-1"
          >
            Inicia sesión
          </button>
        </p>
      </div>
    </div>
  </div>
</div>
