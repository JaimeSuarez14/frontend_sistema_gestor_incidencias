<div
  class="min-h-screen flex items-center justify-center bg-linear-to-br dark:from-blue-950 from-sky-50   dark:to-gray-950 to-cyan-200 px-4 sm:px-6 lg:px-8">
  <div class="w-full max-w-md relative">
    <!-- Logo -->
    <div class="text-center mb-8">
      <h1 class="text-3xl sm:text-4xl font-bold dark:text-white text-black tracking-tight">Sistema Gestor</h1>
      <p class="dark:text-yellow-200 mt-2 text-base sm:text-lg">Incidencias</p>
    </div>

    <!-- Card -->
    <div class="dark:bg-white/10 bg-white backdrop-blur-xl rounded-2xl shadow-2xl border border-white/20 p-6 sm:p-8">
      <h2 class="text-2xl font-semibold dark:text-white text-center mb-6">Iniciar Sesión</h2>

      @if (error()) {
      <div
        class="bg-red-500/20 border border-red-500/50 text-red-600 dark:text-red-200 rounded-lg px-4 py-3 mb-4 text-sm">
        {{ error() }}
      </div>
      }

      <form (ngSubmit)="onSubmit()" class="space-y-5">
        <div>
          <label for="email" class="block text-sm font-medium text-purple-900 dark:text-purple-100 mb-1.5">Correo
            electrónico</label>
          <input type="email" id="email" [value]="email()" (input)="email.set($any($event.target).value)" required
            class="w-full px-4 py-3 dark:bg-white/10 border dark:border-white/20 rounded-lg text-purple-900 dark:text-white dark:placeholder-purple-300/50 focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-transparent transition-all"
            placeholder="correo@ejemplo.com" />
        </div>

        <div>
          <label for="password"
            class="block text-sm font-medium text-purple-900 dark:text-purple-100 mb-1.5">Contraseña</label>
          <input type="password" id="password" [value]="password()" (input)="password.set($any($event.target).value)"
            required
            class="w-full px-4 py-3 dark:bg-white/10 border dark:border-white/20 rounded-lg text-purple-900  dark:text-white dark:placeholder-purple-300/50 focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-transparent transition-all"
            placeholder="••••••••" />
        </div>

        <button type="submit" [disabled]="loading()"
          class="w-full py-3 px-4 bg-linear-to-r from-purple-600 to-indigo-600 hover:from-purple-500 hover:to-indigo-500 text-white font-semibold rounded-lg shadow-lg shadow-purple-500/30 disabled:opacity-50 disabled:cursor-not-allowed transition-all duration-200">
          @if (loading()) {
          <span class="flex items-center justify-center gap-2">
            <svg class="animate-spin h-5 w-5" viewBox="0 0 24 24" fill="none">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
            </svg>
            Cargando...
          </span>
          } @else {
          Entrar
          }
        </button>
      </form>

      <div class="mt-6 text-center">
        <p class="dark:text-purple-200 text-yellow-700 text-sm">
          ¿No tienes cuenta?
          <button (click)="goToRegister()" class="dark:text-white font-semibold hover:underline ml-1">
            Regístrate
          </button>
        </p>
      </div>

      <!-- Credenciales demo -->
      <div class="mt-6 pt-4 border-t dark:border-white/10">
        <p class="dark:text-purple-300/70 text-blue-600 text-xs text-center mb-2 font-medium">Credenciales de prueba:
        </p>
        <div class="grid grid-cols-3 gap-2 text-xs">
          <div class="dark:bg-white/5 bg-gray-200 rounded p-2 text-center">
            <p class="dark:text-purple-200 text-blue-600 font-medium">Admin</p>
            <p class="dark:text-purple-300/60 text-blue-500">admin&#64;test.com</p>
          </div>
          <div class="dark:bg-white/5 bg-gray-200 rounded p-2 text-center">
            <p class="dark:text-purple-200 text-blue-600 font-medium">Usuario</p>
            <p class="dark:text-purple-300/60 text-blue-500">user&#64;test.com</p>
          </div>
          <div class="dark:bg-white/5 bg-gray-200 rounded p-2 text-center">
            <p class="dark:text-purple-200 text-blue-600 font-medium">Técnico</p>
            <p class="dark:text-purple-300/60 text-blue-500">tecnico&#64;test.com</p>
          </div>
        </div>
      </div>
    </div>
    <button type="button" title="Cambiar Tema"
      class="block absolute bg-black dark:bg-white right-1 top-1 py-0.5 px-2 border-2 border-gray-300 dark:border-gray-400/50 hover:bg-gray-400/30 rounded-2xl cursor-pointer transition duration-300 "
      (click)="sessionThema.cambiarThema()">
      @if (sessionThema._isDark()) {
      <span>light</span>
      }@else {
      <span class="text-white">Dark</span>
      }
    </button>

    <label class="inline-flex items-center cursor-pointer absolute right-3 top-9 ">
      <input type="checkbox" class="sr-only peer" [checked]="sessionThema._isDark()"
        (change)="sessionThema.cambiarThema()">
      <div class="w-11 h-6 bg-gray-300 rounded-full peer peer-checked:bg-blue-500 transition-colors duration-300"></div>
      <div
        class="absolute w-5 h-5 bg-white rounded-full left-0.5 top-0.5 peer-checked:translate-x-full transform transition-transform duration-300">
      </div>
      <span class="ml-3 text-sm font-medium text-gray-900">
        {{ sessionThema._isDark() ? 'Activado' : 'Desactivado' }}
      </span>
    </label>

  </div>
</div>
