<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-indigo-900 via-purple-900 to-pink-800 px-4 sm:px-6 lg:px-8">
  <div class="w-full max-w-md">
    <!-- Logo -->
    <div class="text-center mb-8">
      <h1 class="text-3xl sm:text-4xl font-bold text-white tracking-tight">Sistema Gestor</h1>
      <p class="text-purple-200 mt-2 text-sm sm:text-base">Incidencias y Tickets</p>
    </div>

    <!-- Card -->
    <div class="bg-white/10 backdrop-blur-xl rounded-2xl shadow-2xl border border-white/20 p-6 sm:p-8">
      <h2 class="text-2xl font-semibold text-white text-center mb-6">Iniciar Sesión</h2>

      @if (error()) {
        <div class="bg-red-500/20 border border-red-500/50 text-red-200 rounded-lg px-4 py-3 mb-4 text-sm">
          {{ error() }}
        </div>
      }

      <form (ngSubmit)="onSubmit()" class="space-y-5">
        <div>
          <label for="email" class="block text-sm font-medium text-purple-100 mb-1.5">Correo electrónico</label>
          <input
            type="email"
            id="email"
            [value]="email()"
            (input)="email.set($any($event.target).value)"
            required
            class="w-full px-4 py-3 bg-white/10 border border-white/20 rounded-lg text-white placeholder-purple-300/50 focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-transparent transition-all"
            placeholder="correo@ejemplo.com"
          />
        </div>

        <div>
          <label for="password" class="block text-sm font-medium text-purple-100 mb-1.5">Contraseña</label>
          <input
            type="password"
            id="password"
            [value]="password()"
            (input)="password.set($any($event.target).value)"
            required
            class="w-full px-4 py-3 bg-white/10 border border-white/20 rounded-lg text-white placeholder-purple-300/50 focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-transparent transition-all"
            placeholder="••••••••"
          />
        </div>

        <button
          type="submit"
          [disabled]="loading()"
          class="w-full py-3 px-4 bg-gradient-to-r from-purple-600 to-indigo-600 hover:from-purple-500 hover:to-indigo-500 text-white font-semibold rounded-lg shadow-lg shadow-purple-500/30 disabled:opacity-50 disabled:cursor-not-allowed transition-all duration-200"
        >
          @if (loading()) {
            <span class="flex items-center justify-center gap-2">
              <svg class="animate-spin h-5 w-5" viewBox="0 0 24 24" fill="none">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
              </svg>
              Cargando...
            </span>
          } @else {
            Entrar
          }
        </button>
      </form>

      <div class="mt-6 text-center">
        <p class="text-purple-200 text-sm">
          ¿No tienes cuenta?
          <button
            (click)="goToRegister()"
            class="text-white font-semibold hover:underline ml-1"
          >
            Regístrate
          </button>
        </p>
      </div>

      <!-- Credenciales demo -->
      <div class="mt-6 pt-4 border-t border-white/10">
        <p class="text-purple-300/70 text-xs text-center mb-2">Credenciales de prueba:</p>
        <div class="grid grid-cols-3 gap-2 text-xs">
          <div class="bg-white/5 rounded p-2 text-center">
            <p class="text-purple-200 font-medium">Admin</p>
            <p class="text-purple-300/60">admin&#64;test.com</p>
          </div>
          <div class="bg-white/5 rounded p-2 text-center">
            <p class="text-purple-200 font-medium">Usuario</p>
            <p class="text-purple-300/60">user&#64;test.com</p>
          </div>
          <div class="bg-white/5 rounded p-2 text-center">
            <p class="text-purple-200 font-medium">Técnico</p>
            <p class="text-purple-300/60">tecnico&#64;test.com</p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
