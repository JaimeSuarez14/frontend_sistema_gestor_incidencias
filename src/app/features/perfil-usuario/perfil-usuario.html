<div [class]="containerClass() + ' min-h-screen flex items-center justify-center p-6 transition-all duration-300'">

  <div class="w-full max-w-xl rounded-2xl shadow-2xl p-6 bg-white dark:bg-gray-800 transition-all">

    <!-- Header -->
    <div class="flex justify-between items-center mb-6">
      <h2 class="text-xl font-semibold">Configuración de Usuario</h2>

      <button
        (click)="toggleTheme()"
        class="px-3 py-1 rounded-lg text-sm bg-gray-200 dark:bg-gray-700">
        {{ darkMode() ? '🌞 Light' : '🌙 Dark' }}
      </button>
    </div>

    <!-- Campos -->
    <div class="space-y-4">

      <ng-container *ngFor="let field of ['nombre','correo','usuario','clave','rol','area']">
        <div>
          <label class="text-sm opacity-70 capitalize">{{ field }}</label>

          <!-- Vista -->
          <div *ngIf="!editMode()" class="mt-1 p-2 rounded-lg bg-gray-100 dark:bg-gray-700">
            {{ user()[field] }}
          </div>

          <!-- Edición -->
          <input
            *ngIf="editMode()"
            [(ngModel)]="tempUser()[field]"
            class="w-full mt-1 p-2 rounded-lg bg-gray-200 dark:bg-gray-700 outline-none"
          />
        </div>
      </ng-container>

    </div>

    <!-- Botones -->
    <div class="flex justify-end gap-3 mt-6">

      <!-- Modo vista -->
      <button
        *ngIf="!editMode()"
        (click)="toggleEdit()"
        class="px-4 py-2 rounded-xl bg-blue-600 text-white hover:bg-blue-700">
        Editar
      </button>

      <!-- Modo edición -->
      <ng-container *ngIf="editMode()">
        <button
          (click)="cancel()"
          class="px-4 py-2 rounded-xl bg-gray-400 hover:bg-gray-500">
          Cancelar
        </button>

        <button
          (click)="save()"
          class="px-4 py-2 rounded-xl bg-green-600 text-white hover:bg-green-700">
          Guardar
        </button>
      </ng-container>

    </div>

  </div>

</div>
